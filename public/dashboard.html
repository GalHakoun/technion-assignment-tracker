<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Technion Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="navbar">
    <div class="navbar-brand">&#128218; Technion Tracker</div>
    <div class="navbar-right">
      <span class="user-email" id="user-email"></span>
      <button class="btn-settings" onclick="openSettings()" title="Settings">&#9881;&#65039;</button>
      <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="dashboard-content">

    <!-- Assignments -->
    <div class="card">
      <div class="card-header">
        <div class="card-title">&#128203; Your Assignments</div>
        <div style="display:flex;gap:0.5rem">
          <button class="btn-add" onclick="openAddModal()" title="Add assignment">&#43;</button>
          <button class="btn-sync" id="sync-btn" onclick="syncNow()">Sync Now</button>
        </div>
      </div>
      <div id="sync-message" style="display:none" class="message"></div>
      <div id="assignments-container">
        <div class="assignments-placeholder">
          <div class="placeholder-icon">&#128193;</div>
          <p>Your assignments will appear here after you sync.</p>
        </div>
      </div>
    </div>

  </div>

  <!-- Add assignment modal -->
  <div class="modal-overlay" id="add-overlay" style="display:none" onclick="if(event.target===this)closeAddModal()">
    <div class="modal-card">
      <div class="modal-heading">&#43; Add Assignment</div>
      <div class="form-group" style="margin-top:1.25rem">
        <label for="add-title">Title</label>
        <input type="text" id="add-title" placeholder="e.g. HW3">
      </div>
      <div class="form-group">
        <label for="add-course">Course</label>
        <input type="text" id="add-course" placeholder="e.g. Algorithms" list="course-suggestions">
        <datalist id="course-suggestions"></datalist>
      </div>
      <div class="form-group">
        <label for="add-due">Due Date</label>
        <input type="datetime-local" id="add-due">
      </div>
      <div id="add-message" style="display:none" class="message"></div>
      <div class="modal-actions">
        <button class="btn-yes" onclick="submitAdd()">Add</button>
        <button class="btn-no" onclick="closeAddModal()">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Uncertain classification popup -->
  <div class="modal-overlay" id="modal-overlay" style="display:none">
    <div class="modal-card">
      <div class="modal-heading">Is this a homework assignment?</div>
      <div class="modal-sub">Help us learn what to track for you.</div>
      <div class="modal-event-title" id="modal-event-title"></div>
      <div class="modal-actions">
        <button class="btn-yes" onclick="answerUncertain(true)">&#9989; Yes, homework</button>
        <button class="btn-no" onclick="answerUncertain(false)">&#10060; Not homework</button>
      </div>
      <div class="modal-progress" id="modal-progress"></div>
      <div style="text-align:center;margin-top:0.75rem">
        <button onclick="skipAllUncertain()" style="background:none;border:none;color:var(--text-muted);font-size:0.8rem;cursor:pointer;text-decoration:underline">Skip all remaining</button>
      </div>
    </div>
  </div>

  <!-- Morning summary popup -->
  <div class="modal-overlay" id="morning-overlay" style="display:none">
    <div class="modal-card morning-card">
      <div class="morning-greeting">בוקר טוב! &#127749;</div>
      <div class="morning-tiles">
        <div class="morning-tile">
          <div class="morning-tile-num" id="morning-upcoming">—</div>
          <div class="morning-tile-label">מטלות ב-7 ימים הקרובים</div>
        </div>
        <div class="morning-tile morning-tile-new" id="morning-new-tile">
          <div class="morning-tile-num" id="morning-new">—</div>
          <div class="morning-tile-label">מטלות חדשות מאז אתמול</div>
        </div>
      </div>
      <button class="btn-yes" style="width:100%;margin-top:1.25rem" onclick="closeMorning()">בואו נתחיל &#8594;</button>
    </div>
  </div>

  <!-- Settings modal -->
  <div class="modal-overlay" id="settings-overlay" style="display:none" onclick="if(event.target===this)closeSettings()">
    <div class="modal-card">
      <div class="modal-heading">&#9881;&#65039; Settings</div>
      <div class="form-group" style="margin-top:1.25rem">
        <label for="settings-moodle-url">Moodle iCal URL</label>
        <input type="url" id="settings-moodle-url" placeholder="https://moodle25.technion.ac.il/calendar/export_execute.php?...">
      </div>
      <div id="settings-message" style="display:none" class="message"></div>
      <div class="modal-actions">
        <button class="btn-yes" onclick="saveSettings()">Save</button>
        <button class="btn-no" onclick="closeSettings()">Cancel</button>
      </div>
      <div id="hidden-courses-section" style="display:none;margin-top:1.25rem;border-top:1px solid var(--border);padding-top:1.25rem">
        <div style="font-size:0.875rem;font-weight:600;margin-bottom:0.75rem">Hidden Courses</div>
        <div id="hidden-courses-list"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const { createClient } = supabase;
    const sb = createClient(
      'https://rcngaonfuljhtthsvpap.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJjbmdhb25mdWxqaHR0aHN2cGFwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MjUyMjMsImV4cCI6MjA5MjUwMTIyM30.5Ig-xpFdKGcK7U_l1jauGb8dSci6atmJoDng2p1A9N0'
    );

    let currentUser = null;
    let uncertainQueue = [];
    let uncertainIndex = 0;
    let courseNameMap = {};

    function hiddenCoursesKey() { return `hidden_courses_${currentUser.id}`; }
    function getHiddenCourses() { return new Set(JSON.parse(localStorage.getItem(hiddenCoursesKey()) || '[]')); }
    function saveHiddenCourses(set) { localStorage.setItem(hiddenCoursesKey(), JSON.stringify([...set])); }

    function hideCourse(courseKey) {
      const hidden = getHiddenCourses();
      hidden.add(courseKey);
      saveHiddenCourses(hidden);
      loadAssignments();
    }

    function unhideCourse(courseKey) {
      const hidden = getHiddenCourses();
      hidden.delete(courseKey);
      saveHiddenCourses(hidden);
      loadAssignments();
      openSettings();
    }

    function loadCourseNames() {
      return new Promise((resolve) => {
        const now = new Date();
        const month = now.getMonth() + 1;
        const year = now.getFullYear();
        // CheeseFork uses the year the academic year started (fall year)
        const fileYear = month >= 9 ? year : year - 1;
        const sapSemester = month >= 9 ? 200 : 201;
        const script = document.createElement('script');
        script.src = `https://sap.cheesefork.cf/courses_${fileYear}_${sapSemester}.min.js`;
        script.onload = () => {
          if (window.courses_from_rishum) {
            for (const c of window.courses_from_rishum) {
              const num = c.general?.['מספר מקצוע'];
              const name = c.general?.['שם מקצוע'];
              if (num && name) courseNameMap[num] = name;
            }
          }
          resolve();
        };
        script.onerror = () => resolve();
        document.head.appendChild(script);
      });
    }

    async function init() {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) { window.location.href = 'index.html'; return; }
      currentUser = session.user;
      document.getElementById('user-email').textContent = currentUser.email;
      const hasUrl = await loadProfile();
      if (!hasUrl) { window.location.href = 'onboarding.html'; return; }
      await loadCourseNames();
      await loadAssignments();
      await maybeShowMorning();
      maybeAutoSync();
    }

    async function maybeShowMorning() {
      const todayKey = new Date().toISOString().slice(0, 10);
      const seenKey = `morning_seen_${currentUser.id}`;
      const lastSeen = localStorage.getItem(seenKey);
      if (lastSeen === todayKey) return;

      const lastSeenDate = lastSeen ? new Date(lastSeen + 'T00:00:00') : new Date(0);
      const now = new Date();
      const in7days = new Date(now.getTime() + 7 * 24 * 60 * 60 * 1000);

      const [{ data: upcoming }, { data: newOnes }] = await Promise.all([
        sb.from('assignments')
          .select('id')
          .eq('user_id', currentUser.id)
          .gte('due_date', now.toISOString())
          .lte('due_date', in7days.toISOString()),
        sb.from('assignments')
          .select('id')
          .eq('user_id', currentUser.id)
          .gt('created_at', lastSeenDate.toISOString()),
      ]);

      const upcomingCount = upcoming?.length || 0;
      const newCount = newOnes?.length || 0;

      document.getElementById('morning-upcoming').textContent = upcomingCount;
      document.getElementById('morning-new').textContent = newCount;

      const newTile = document.getElementById('morning-new-tile');
      if (newCount > 0) newTile.classList.add('has-new');

      document.getElementById('morning-overlay').style.display = 'flex';
    }

    function closeMorning() {
      document.getElementById('morning-overlay').style.display = 'none';
      const todayKey = new Date().toISOString().slice(0, 10);
      localStorage.setItem(`morning_seen_${currentUser.id}`, todayKey);
    }

    async function loadProfile() {
      const { data } = await sb
        .from('profiles')
        .select('moodle_ical_url')
        .eq('user_id', currentUser.id)
        .single();
      if (data?.moodle_ical_url) {
        document.getElementById('settings-moodle-url').value = data.moodle_ical_url;
        return true;
      }
      return false;
    }

    function openSettings() {
      document.getElementById('settings-overlay').style.display = 'flex';
      const hidden = getHiddenCourses();
      const section = document.getElementById('hidden-courses-section');
      const list = document.getElementById('hidden-courses-list');
      if (hidden.size === 0) {
        section.style.display = 'none';
        return;
      }
      section.style.display = 'block';
      list.innerHTML = [...hidden].map(course => {
        const name = courseNameMap[course] || course;
        return `<div class="hidden-course-row">
          <span>${escHtml(name)}</span>
          <button class="btn-unhide" onclick="unhideCourse('${escHtml(course)}')">Show</button>
        </div>`;
      }).join('');
    }

    function closeSettings() {
      document.getElementById('settings-overlay').style.display = 'none';
      showSettingsMessage('', '');
    }

    async function saveSettings() {
      const url = document.getElementById('settings-moodle-url').value.trim();
      showSettingsMessage('', '');
      const { error } = await sb.from('profiles').upsert(
        { user_id: currentUser.id, moodle_ical_url: url },
        { onConflict: 'user_id' }
      );
      if (error) {
        showSettingsMessage('Failed to save: ' + error.message, 'error');
      } else {
        showSettingsMessage('Saved!', 'success');
        setTimeout(() => closeSettings(), 1500);
      }
    }

    function showSettingsMessage(text, type) {
      const el = document.getElementById('settings-message');
      if (!text) { el.style.display = 'none'; return; }
      el.textContent = text;
      el.className = 'message ' + type;
      el.style.display = 'block';
    }

    // ── Sync flow ──

    async function syncNow() {
      const btn = document.getElementById('sync-btn');
      btn.disabled = true;
      btn.textContent = 'Fetching...';
      showSyncMessage('', '');

      const { data: { session } } = await sb.auth.getSession();
      const token = session.access_token;

      // Step 1: fetch raw events
      const fetchRes = await fetch('/api/fetch', {
        method: 'POST',
        headers: { Authorization: 'Bearer ' + token },
      });
      const fetchJson = await fetchRes.json();

      if (!fetchRes.ok) {
        showSyncMessage(fetchJson.error || 'Sync failed.', 'error');
        btn.disabled = false;
        btn.textContent = 'Sync Now';
        return;
      }

      // Step 2: classify
      btn.textContent = 'Classifying...';
      const classifyRes = await fetch('/api/classify', {
        method: 'POST',
        headers: { Authorization: 'Bearer ' + token },
      });
      const classifyJson = await classifyRes.json();

      btn.disabled = false;
      btn.textContent = 'Sync Now';

      if (!classifyRes.ok) {
        showSyncMessage(classifyJson.error || 'Classification failed.', 'error');
        return;
      }

      const msg = `Synced ${fetchJson.count} events · Found ${classifyJson.homework_added} new assignments` +
        (classifyJson.uncertain_count > 0 ? ` · ${classifyJson.uncertain_count} need your input` : '');
      showSyncMessage(msg, 'success');

      // Step 3: show uncertain popup if needed, then load assignments
      if (classifyJson.uncertain_events?.length > 0) {
        startUncertainQueue(classifyJson.uncertain_events);
      } else {
        await loadAssignments();
      }
    }

    function showSyncMessage(text, type) {
      const el = document.getElementById('sync-message');
      if (!text) { el.style.display = 'none'; return; }
      el.textContent = text;
      el.className = 'message ' + type;
      el.style.display = 'block';
    }

    // ── Uncertain popup ──

    function startUncertainQueue(events) {
      uncertainQueue = events;
      uncertainIndex = 0;
      showNextUncertain();
    }

    function showNextUncertain() {
      if (uncertainIndex >= uncertainQueue.length) {
        document.getElementById('modal-overlay').style.display = 'none';
        loadAssignments();
        return;
      }
      const event = uncertainQueue[uncertainIndex];
      document.getElementById('modal-event-title').textContent = event.title || '(no title)';
      document.getElementById('modal-progress').textContent =
        `${uncertainIndex + 1} of ${uncertainQueue.length}`;
      document.getElementById('modal-overlay').style.display = 'flex';
    }

    async function answerUncertain(isHomework) {
      const event = uncertainQueue[uncertainIndex];
      const classification = isHomework ? 'homework' : 'not_homework';

      await sb.from('classifications').upsert(
        { user_id: currentUser.id, normalized_title: event.normalized_title, classification },
        { onConflict: 'user_id,normalized_title' }
      );

      if (isHomework) {
        await sb.from('assignments').upsert(
          {
            user_id: currentUser.id,
            raw_event_id: event.id,
            title: event.title,
            course_name: event.course_name || extractCourse(event.title),
            due_date: event.due_date,
          },
          { onConflict: 'user_id,raw_event_id' }
        );
      }

      uncertainIndex++;
      showNextUncertain();
    }

    function skipAllUncertain() {
      document.getElementById('modal-overlay').style.display = 'none';
      loadAssignments();
    }

    function extractCourse(title) {
      if (!title) return null;
      const i = title.indexOf(':');
      if (i > 0 && i < 60) return title.substring(0, i).trim();
      return null;
    }

    // ── Assignments display ──

    async function loadAssignments() {
      const { data, error } = await sb
        .from('assignments')
        .select('*')
        .eq('user_id', currentUser.id)
        .order('due_date', { ascending: true });

      renderAssignments(error ? [] : (data || []));
    }

    function renderAssignments(assignments) {
      const container = document.getElementById('assignments-container');
      if (!assignments.length) {
        container.innerHTML = `
          <div class="assignments-placeholder">
            <div class="placeholder-icon">&#128193;</div>
            <p>Your assignments will appear here after you sync.</p>
          </div>`;
        return;
      }

      const active = assignments.filter(a => !a.completed);
      const done = assignments.filter(a => a.completed);

      const hidden = getHiddenCourses();

      function buildGroups(list, showHideBtn) {
        const grouped = {};
        for (const a of list) {
          const key = a.course_name || '—';
          if (!grouped[key]) grouped[key] = [];
          grouped[key].push(a);
        }
        const sorted = Object.keys(grouped).sort((a, b) => a.localeCompare(b, 'he'));
        let html = '';
        for (const course of sorted) {
          if (showHideBtn && hidden.has(course)) continue;
          const displayName = courseNameMap[course] || course;
          const hideBtn = showHideBtn
            ? `<button class="btn-hide-course" onclick="hideCourse('${escHtml(course)}')" title="Hide course">&#10005;</button>`
            : '';
          const sortedItems = grouped[course].slice().sort((a, b) => {
            if (!a.due_date) return 1;
            if (!b.due_date) return -1;
            return new Date(a.due_date) - new Date(b.due_date);
          });
          html += `<div class="course-section"><div class="course-header">${escHtml(displayName)}${hideBtn}</div>`;
          for (const a of sortedItems) html += renderCard(a);
          html += '</div>';
        }
        return html;
      }

      let html = '<div class="assignment-list">';
      if (active.length) {
        html += buildGroups(active, true);
      } else {
        html += `<div class="assignments-placeholder" style="padding:2rem 1rem">
          <div class="placeholder-icon">&#9989;</div>
          <p>כל המטלות הושלמו!</p>
        </div>`;
      }

      if (done.length) {
        html += `<div class="completed-toggle" onclick="toggleCompleted(this)">
          &#9660; ${done.length} הושלמו
        </div>
        <div class="completed-section" style="display:none">
          ${buildGroups(done, false)}
        </div>`;
      }

      html += '</div>';
      container.innerHTML = html;
    }

    function toggleCompleted(btn) {
      const section = btn.nextElementSibling;
      const isOpen = section.style.display !== 'none';
      section.style.display = isOpen ? 'none' : 'block';
      btn.innerHTML = `${isOpen ? '&#9660;' : '&#9650;'} ${btn.textContent.trim().split(' ').slice(1).join(' ')}`;
    }

    async function toggleComplete(id, current) {
      await sb.from('assignments')
        .update({ completed: !current })
        .eq('id', id)
        .eq('user_id', currentUser.id);
      await loadAssignments();
    }

    function renderCard(a) {
      const now = new Date();
      const due = a.due_date ? new Date(a.due_date) : null;
      let urgency = 'ok', countdown = '';

      if (!a.completed && due) {
        const days = Math.ceil((due - now) / (1000 * 60 * 60 * 24));
        if (days < 0) {
          urgency = 'overdue';
          countdown = `Overdue by ${Math.abs(days)}d`;
        } else if (days <= 3) {
          urgency = 'soon';
          countdown = days === 0 ? 'Due today!' : `${days}d left`;
        } else {
          urgency = 'ok';
          countdown = `${days}d left`;
        }
      }

      const dueFmt = due
        ? due.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' })
        : '—';

      const completedClass = a.completed ? 'completed' : '';

      return `
        <div class="assignment-card ${urgency} ${completedClass}">
          <button class="btn-complete" onclick="toggleComplete('${a.id}', ${a.completed})" title="${a.completed ? 'Mark incomplete' : 'Mark done'}">
            ${a.completed ? '&#9989;' : '&#9711;'}
          </button>
          <div class="assignment-info">
            <div class="assignment-title">${escHtml(a.title)}</div>
          </div>
          <div class="assignment-due">
            <div class="due-date">${dueFmt}</div>
            ${countdown ? `<div class="due-countdown ${urgency}">${countdown}</div>` : ''}
          </div>
        </div>`;
    }

    function escHtml(str) {
      return (str || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // ── Auto sync ──

    function maybeAutoSync() {
      const todayKey = new Date().toISOString().slice(0, 10);
      const syncKey = `last_auto_sync_${currentUser.id}`;
      if (localStorage.getItem(syncKey) === todayKey) return;
      localStorage.setItem(syncKey, todayKey);
      syncNow();
    }

    // ── Manual assignment entry ──

    function openAddModal() {
      document.getElementById('add-title').value = '';
      document.getElementById('add-course').value = '';
      document.getElementById('add-due').value = '';
      document.getElementById('add-message').style.display = 'none';

      // Populate course suggestions from existing assignments
      const { data } = { data: null }; // populated below
      const existing = document.querySelectorAll('.course-header');
      const datalist = document.getElementById('course-suggestions');
      datalist.innerHTML = '';
      const seen = new Set();
      existing.forEach(el => {
        const name = el.textContent.trim().replace('×', '').trim();
        if (name && !seen.has(name)) {
          seen.add(name);
          const opt = document.createElement('option');
          opt.value = name;
          datalist.appendChild(opt);
        }
      });

      document.getElementById('add-overlay').style.display = 'flex';
      setTimeout(() => document.getElementById('add-title').focus(), 50);
    }

    function closeAddModal() {
      document.getElementById('add-overlay').style.display = 'none';
    }

    async function submitAdd() {
      const title = document.getElementById('add-title').value.trim();
      const course = document.getElementById('add-course').value.trim();
      const due = document.getElementById('add-due').value;

      if (!title) {
        const el = document.getElementById('add-message');
        el.textContent = 'Please enter a title.';
        el.className = 'message error';
        el.style.display = 'block';
        return;
      }

      // Resolve display course name back to course key if possible
      const courseKey = Object.entries(courseNameMap).find(([, name]) => name === course)?.[0] || course || null;

      const { error } = await sb.from('assignments').insert({
        user_id: currentUser.id,
        title,
        course_name: courseKey,
        due_date: due ? new Date(due).toISOString() : null,
      });

      if (error) {
        const el = document.getElementById('add-message');
        el.textContent = 'Failed to save: ' + error.message;
        el.className = 'message error';
        el.style.display = 'block';
        return;
      }

      closeAddModal();
      await loadAssignments();
    }

    async function logout() {
      await sb.auth.signOut();
      window.location.href = 'index.html';
    }

    init();
  </script>

</body>
</html>
