<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Technion Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="navbar">
    <div class="navbar-brand">&#128218; Technion Tracker</div>
    <div class="navbar-right">
      <span class="user-email" id="user-email"></span>
      <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="dashboard-content">

    <!-- Settings -->
    <div class="card">
      <div class="card-header">
        <div class="card-title">&#9881;&#65039; Settings</div>
      </div>
      <div id="settings-message" style="display:none" class="message"></div>
      <div class="settings-row">
        <div class="form-group">
          <label for="moodle-url">Moodle iCal URL</label>
          <input
            type="url"
            id="moodle-url"
            placeholder="https://moodle25.technion.ac.il/calendar/export_execute.php?..."
          >
        </div>
        <button class="btn btn-primary" onclick="saveSettings()">Save</button>
      </div>
    </div>

    <!-- Assignments -->
    <div class="card">
      <div class="card-header">
        <div class="card-title">&#128203; Your Assignments</div>
        <button class="btn-sync" id="sync-btn" onclick="syncNow()">Sync Now</button>
      </div>
      <div id="sync-message" style="display:none" class="message"></div>
      <div id="assignments-container">
        <div class="assignments-placeholder">
          <div class="placeholder-icon">&#128193;</div>
          <p>Your assignments will appear here after you sync.</p>
        </div>
      </div>
    </div>

  </div>

  <!-- Uncertain classification popup -->
  <div class="modal-overlay" id="modal-overlay" style="display:none">
    <div class="modal-card">
      <div class="modal-heading">Is this a homework assignment?</div>
      <div class="modal-sub">Help us learn what to track for you.</div>
      <div class="modal-event-title" id="modal-event-title"></div>
      <div class="modal-actions">
        <button class="btn-yes" onclick="answerUncertain(true)">&#9989; Yes, homework</button>
        <button class="btn-no" onclick="answerUncertain(false)">&#10060; Not homework</button>
      </div>
      <div class="modal-progress" id="modal-progress"></div>
      <div style="text-align:center;margin-top:0.75rem">
        <button onclick="skipAllUncertain()" style="background:none;border:none;color:var(--text-muted);font-size:0.8rem;cursor:pointer;text-decoration:underline">Skip all remaining</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const { createClient } = supabase;
    const sb = createClient(
      'https://rcngaonfuljhtthsvpap.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJjbmdhb25mdWxqaHR0aHN2cGFwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MjUyMjMsImV4cCI6MjA5MjUwMTIyM30.5Ig-xpFdKGcK7U_l1jauGb8dSci6atmJoDng2p1A9N0'
    );

    let currentUser = null;
    let uncertainQueue = [];
    let uncertainIndex = 0;
    let courseNameMap = {};

    function loadCourseNames() {
      return new Promise((resolve) => {
        const now = new Date();
        const month = now.getMonth() + 1;
        const year = now.getFullYear();
        // CheeseFork uses the year the academic year started (fall year)
        const fileYear = month >= 9 ? year : year - 1;
        const sapSemester = month >= 9 ? 200 : 201;
        const script = document.createElement('script');
        script.src = `https://sap.cheesefork.cf/courses_${fileYear}_${sapSemester}.min.js`;
        script.onload = () => {
          if (window.courses_from_rishum) {
            for (const c of window.courses_from_rishum) {
              const num = c.general?.['מספר מקצוע'];
              const name = c.general?.['שם מקצוע'];
              if (num && name) courseNameMap[num] = name;
            }
          }
          resolve();
        };
        script.onerror = () => resolve();
        document.head.appendChild(script);
      });
    }

    async function init() {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) { window.location.href = 'index.html'; return; }
      currentUser = session.user;
      document.getElementById('user-email').textContent = currentUser.email;
      await loadProfile();
      await loadCourseNames();
      await loadAssignments();
    }

    async function loadProfile() {
      const { data } = await sb
        .from('profiles')
        .select('moodle_ical_url')
        .eq('user_id', currentUser.id)
        .single();
      if (data?.moodle_ical_url) {
        document.getElementById('moodle-url').value = data.moodle_ical_url;
      }
    }

    async function saveSettings() {
      const url = document.getElementById('moodle-url').value.trim();
      showSettingsMessage('', '');
      const { error } = await sb.from('profiles').upsert(
        { user_id: currentUser.id, moodle_ical_url: url },
        { onConflict: 'user_id' }
      );
      if (error) {
        showSettingsMessage('Failed to save: ' + error.message, 'error');
      } else {
        showSettingsMessage('Settings saved!', 'success');
        setTimeout(() => showSettingsMessage('', ''), 3000);
      }
    }

    function showSettingsMessage(text, type) {
      const el = document.getElementById('settings-message');
      if (!text) { el.style.display = 'none'; return; }
      el.textContent = text;
      el.className = 'message ' + type;
      el.style.display = 'block';
    }

    // ── Sync flow ──

    async function syncNow() {
      const btn = document.getElementById('sync-btn');
      btn.disabled = true;
      btn.textContent = 'Fetching...';
      showSyncMessage('', '');

      const { data: { session } } = await sb.auth.getSession();
      const token = session.access_token;

      // Step 1: fetch raw events
      const fetchRes = await fetch('/api/fetch', {
        method: 'POST',
        headers: { Authorization: 'Bearer ' + token },
      });
      const fetchJson = await fetchRes.json();

      if (!fetchRes.ok) {
        showSyncMessage(fetchJson.error || 'Sync failed.', 'error');
        btn.disabled = false;
        btn.textContent = 'Sync Now';
        return;
      }

      // Step 2: classify
      btn.textContent = 'Classifying...';
      const classifyRes = await fetch('/api/classify', {
        method: 'POST',
        headers: { Authorization: 'Bearer ' + token },
      });
      const classifyJson = await classifyRes.json();

      btn.disabled = false;
      btn.textContent = 'Sync Now';

      if (!classifyRes.ok) {
        showSyncMessage(classifyJson.error || 'Classification failed.', 'error');
        return;
      }

      const msg = `Synced ${fetchJson.count} events · Found ${classifyJson.homework_added} new assignments` +
        (classifyJson.uncertain_count > 0 ? ` · ${classifyJson.uncertain_count} need your input` : '');
      showSyncMessage(msg, 'success');

      // Step 3: show uncertain popup if needed, then load assignments
      if (classifyJson.uncertain_events?.length > 0) {
        startUncertainQueue(classifyJson.uncertain_events);
      } else {
        await loadAssignments();
      }
    }

    function showSyncMessage(text, type) {
      const el = document.getElementById('sync-message');
      if (!text) { el.style.display = 'none'; return; }
      el.textContent = text;
      el.className = 'message ' + type;
      el.style.display = 'block';
    }

    // ── Uncertain popup ──

    function startUncertainQueue(events) {
      uncertainQueue = events;
      uncertainIndex = 0;
      showNextUncertain();
    }

    function showNextUncertain() {
      if (uncertainIndex >= uncertainQueue.length) {
        document.getElementById('modal-overlay').style.display = 'none';
        loadAssignments();
        return;
      }
      const event = uncertainQueue[uncertainIndex];
      document.getElementById('modal-event-title').textContent = event.title || '(no title)';
      document.getElementById('modal-progress').textContent =
        `${uncertainIndex + 1} of ${uncertainQueue.length}`;
      document.getElementById('modal-overlay').style.display = 'flex';
    }

    async function answerUncertain(isHomework) {
      const event = uncertainQueue[uncertainIndex];
      const classification = isHomework ? 'homework' : 'not_homework';

      await sb.from('classifications').upsert(
        { user_id: currentUser.id, normalized_title: event.normalized_title, classification },
        { onConflict: 'user_id,normalized_title' }
      );

      if (isHomework) {
        await sb.from('assignments').upsert(
          {
            user_id: currentUser.id,
            raw_event_id: event.id,
            title: event.title,
            course_name: event.course_name || extractCourse(event.title),
            due_date: event.due_date,
          },
          { onConflict: 'user_id,raw_event_id' }
        );
      }

      uncertainIndex++;
      showNextUncertain();
    }

    function skipAllUncertain() {
      document.getElementById('modal-overlay').style.display = 'none';
      loadAssignments();
    }

    function extractCourse(title) {
      if (!title) return null;
      const i = title.indexOf(':');
      if (i > 0 && i < 60) return title.substring(0, i).trim();
      return null;
    }

    // ── Assignments display ──

    async function loadAssignments() {
      const { data, error } = await sb
        .from('assignments')
        .select('*')
        .eq('user_id', currentUser.id)
        .order('due_date', { ascending: true });

      renderAssignments(error ? [] : (data || []));
    }

    function renderAssignments(assignments) {
      const container = document.getElementById('assignments-container');
      if (!assignments.length) {
        container.innerHTML = `
          <div class="assignments-placeholder">
            <div class="placeholder-icon">&#128193;</div>
            <p>Your assignments will appear here after you sync.</p>
          </div>`;
        return;
      }

      // Group by course_name, resolve number to display name
      const grouped = {};
      for (const a of assignments) {
        const key = a.course_name || '—';
        if (!grouped[key]) grouped[key] = [];
        grouped[key].push(a);
      }

      const sortedCourses = Object.keys(grouped).sort((a, b) => a.localeCompare(b, 'he'));

      let html = '<div class="assignment-list">';
      for (const course of sortedCourses) {
        const displayName = courseNameMap[course] || course;
        html += `<div class="course-section">
          <div class="course-header">${escHtml(displayName)}</div>`;
        for (const a of grouped[course]) {
          html += renderCard(a);
        }
        html += '</div>';
      }
      html += '</div>';

      container.innerHTML = html;
    }

    function renderCard(a) {
      const now = new Date();
      const due = a.due_date ? new Date(a.due_date) : null;
      let urgency = 'ok', countdown = '';

      if (due) {
        const days = Math.ceil((due - now) / (1000 * 60 * 60 * 24));
        if (days < 0) {
          urgency = 'overdue';
          countdown = `Overdue by ${Math.abs(days)}d`;
        } else if (days <= 3) {
          urgency = 'soon';
          countdown = days === 0 ? 'Due today!' : `${days}d left`;
        } else {
          urgency = 'ok';
          countdown = `${days}d left`;
        }
      }

      const dueFmt = due
        ? due.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' })
        : '—';

      return `
        <div class="assignment-card ${urgency}">
          <div class="assignment-info">
            <div class="assignment-title">${escHtml(a.title)}</div>
          </div>
          <div class="assignment-due">
            <div class="due-date">${dueFmt}</div>
            ${countdown ? `<div class="due-countdown ${urgency}">${countdown}</div>` : ''}
          </div>
        </div>`;
    }

    function escHtml(str) {
      return (str || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    async function logout() {
      await sb.auth.signOut();
      window.location.href = 'index.html';
    }

    init();
  </script>

</body>
</html>
