<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checker</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#7c6ff7">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Checker">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f4f3fb;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
      overflow: hidden;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse-ring {
      0%   { transform: scale(1);   opacity: 0.5; }
      70%  { transform: scale(1.5); opacity: 0;   }
      100% { transform: scale(1.5); opacity: 0;   }
    }
    @keyframes checkDraw {
      from { stroke-dashoffset: 40; }
      to   { stroke-dashoffset: 0;  }
    }

    .f1 { animation: fadeUp .7s ease both .1s;  }
    .f2 { animation: fadeUp .7s ease both .3s;  }
    .f3 { animation: fadeUp .7s ease both .5s;  }
    .f4 { animation: fadeUp .7s ease both .65s; }

    .notebook-bg {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -35%);
      width: 92%;
      max-width: 620px;
      pointer-events: none;
    }

    .container {
      width: 100%;
      max-width: 320px;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      z-index: 2;
    }

    .logo-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      margin-bottom: 28px;
    }

    .icon-ring-container { position: relative; width: 64px; height: 64px; }

    .pulse-ring {
      position: absolute; inset: 0;
      border-radius: 50%;
      border: 1.5px solid #9b94cc;
      animation: pulse-ring 2.5s ease-out infinite;
    }
    .pulse-ring-2 {
      position: absolute; inset: 0;
      border-radius: 50%;
      border: 1.5px solid #c8c2f0;
      animation: pulse-ring 2.5s ease-out infinite .7s;
    }

    .icon-circle {
      position: absolute; inset: 0;
      background: #111;
      border-radius: 50%;
      border: 2px solid #9b94cc;
      display: flex; align-items: center; justify-content: center;
    }

    .icon-circle svg polyline {
      stroke-dasharray: 40;
      animation: checkDraw .8s ease both .3s;
    }

    .logo-title h1 {
      font-size: 22px; font-weight: 600;
      color: #26215C; letter-spacing: -.3px; text-align: center;
    }
    .logo-title p {
      margin-top: 5px; font-size: 12px;
      font-weight: 600; color: #9b94cc; text-align: center;
    }

    .card {
      width: 100%;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(12px);
      border: 1px solid #e8e4f8;
      border-radius: 14px;
      padding: 22px 20px;
      display: flex; flex-direction: column; gap: 14px;
      box-shadow: 0 2px 20px rgba(83,74,183,.07);
    }

    .field { display: flex; flex-direction: column; gap: 5px; }
    .field label { font-size: 11px; font-weight: 600; color: #9b94cc; letter-spacing: .3px; }
    .field input {
      background: #f7f6ff; border: 1px solid #ddd8f5;
      border-radius: 10px; padding: 12px 14px;
      color: #26215C; font-size: 14px; outline: none;
      transition: border-color .25s; font-family: inherit; width: 100%;
      direction: ltr;
    }
    .field input:focus { border-color: #9b94cc; }
    .field input::placeholder { color: #b0a8d8; }

    .forgot a { font-size: 11px; font-weight: 600; color: #9b94cc; text-decoration: none; }

    .message-box {
      padding: 10px 14px; border-radius: 8px;
      font-size: 13px; display: none;
    }
    .message-box.error   { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
    .message-box.success { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }

    .btn-login {
      width: 100%; padding: 11px; background: #534AB7;
      border: none; border-radius: 9px; color: white;
      font-size: 13px; font-weight: 600; cursor: pointer;
      transition: background .25s, transform .1s; font-family: inherit;
    }
    .btn-login:hover    { background: #7F77DD; }
    .btn-login:active   { transform: scale(.97); }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }

    .bottom-text { margin-top: 14px; font-size: 12px; font-weight: 600; color: #534AB7; text-align: center; }
    .bottom-text a { color: #534AB7; font-weight: 700; text-decoration: none; cursor: pointer; }

    .divider { margin-top: 18px; display: flex; align-items: center; gap: 10px; }
    .divider-line { height: 1px; width: 50px; background: #e0dcf5; }
    .divider span { font-size: 12px; font-weight: 600; color: #534AB7; }

    .social-buttons { margin-top: 10px; display: flex; gap: 8px; }
    .btn-social {
      padding: 8px 14px; background: rgba(255,255,255,.8);
      border: 1px solid #e0dcf5; border-radius: 8px;
      color: #534AB7; font-size: 12px; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: border-color .2s;
    }
    .btn-social:hover { border-color: #9b94cc; }

    /* מסך אימות */
    .verify-screen {
      display: none; flex-direction: column;
      align-items: center; text-align: center; gap: 12px; padding: 4px 0;
    }
    .verify-icon { font-size: 2.2rem; }
    .verify-title { font-size: 0.95rem; font-weight: 700; color: #26215C; }
    .verify-desc { font-size: 0.82rem; color: #6b7280; line-height: 1.65; }
    .verify-email { color: #26215C; font-weight: 600; direction: ltr; display: inline-block; }
    .btn-resend {
      width: 100%; padding: 11px; background: #534AB7;
      border: none; border-radius: 9px; color: white;
      font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit;
    }
    .btn-resend:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-back { background: none; border: none; color: #9b94cc; font-size: 12px; cursor: pointer; font-family: inherit; text-decoration: underline; }
  </style>
</head>
<body>

  </svg>

  <div class="container">

    <div class="logo-section f1">
      <div class="icon-ring-container">
        <div class="pulse-ring"></div>
        <div class="pulse-ring-2"></div>
        <div class="icon-circle">
          <svg width="28" height="28" viewBox="0 0 14 14" fill="none">
            <polyline points="2,7 6,11 12,3" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>
      <div class="logo-title">
        <h1>Checker</h1>
        <p>המטלות שלך, מסודרות</p>
      </div>
    </div>

    <div class="card f2" id="auth-card">
      <div class="field" id="email-field">
        <label for="email">אימייל</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="field" id="password-field">
        <label for="password">סיסמה</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" minlength="6">
      </div>
      <div class="forgot" id="forgot-row">
        <a href="#">שכחתי סיסמה</a>
      </div>
      <div class="message-box" id="message-box"></div>
      <button class="btn-login" id="submit-btn" onclick="handleSubmit()">כניסה</button>

      <div class="verify-screen" id="verify-screen">
        <div class="verify-icon">📧</div>
        <div class="verify-title">בדוק את האימייל שלך</div>
        <div class="verify-desc">
          שלחנו קישור אימות אל<br>
          <span class="verify-email" id="verify-email"></span>
        </div>
        <button class="btn-resend" id="resend-btn" onclick="resendVerification()">שלח שוב</button>
        <button class="btn-back" onclick="backToLogin()">חזור להתחברות</button>
      </div>
    </div>

    <p class="bottom-text f3" id="toggle-link">
      אין לך חשבון? <a onclick="switchMode()">הרשמה</a>
    </p>

    <div class="divider f4">
      <div class="divider-line"></div>
      <span>או כניסה עם</span>
      <div class="divider-line"></div>
    </div>

    <div class="social-buttons f4">
      <button class="btn-social">Google</button>
      <button class="btn-social">Microsoft</button>
      <button class="btn-social">Apple</button>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const { createClient } = supabase;
    const sb = createClient(
      'https://rcngaonfuljhtthsvpap.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJjbmdhb25mdWxqaHR0aHN2cGFwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MjUyMjMsImV4cCI6MjA5MjUwMTIyM30.5Ig-xpFdKGcK7U_l1jauGb8dSci6atmJoDng2p1A9N0'
    );

    let mode = 'login';
    let pendingEmail = '';

    async function init() {
      const params = new URLSearchParams(window.location.search);
      if (params.get('code')) {
        const { error } = await sb.auth.exchangeCodeForSession(window.location.href);
        if (!error) { window.location.href = 'dashboard.html'; return; }
      }
      const { data: { session } } = await sb.auth.getSession();
      if (session) window.location.href = 'dashboard.html';
    }
    init();

    function switchMode() {
      mode = mode === 'login' ? 'signup' : 'login';
      const isLogin = mode === 'login';
      document.getElementById('submit-btn').textContent = isLogin ? 'כניסה' : 'צור חשבון';
      document.getElementById('forgot-row').style.display = isLogin ? 'block' : 'none';
      document.getElementById('password').autocomplete = isLogin ? 'current-password' : 'new-password';
      document.getElementById('toggle-link').innerHTML = isLogin
        ? 'אין לך חשבון? <a onclick="switchMode()">הרשמה</a>'
        : 'כבר יש לך חשבון? <a onclick="switchMode()">התחברות</a>';
      hideMessage();
    }

    function showMessage(text, type) {
      const el = document.getElementById('message-box');
      el.textContent = text;
      el.className = 'message-box ' + type;
      el.style.display = 'block';
    }
    function hideMessage() { document.getElementById('message-box').style.display = 'none'; }

    function showVerifyScreen(email) {
      pendingEmail = email;
      document.getElementById('verify-email').textContent = email;
      document.getElementById('email-field').style.display    = 'none';
      document.getElementById('password-field').style.display = 'none';
      document.getElementById('forgot-row').style.display     = 'none';
      document.getElementById('submit-btn').style.display     = 'none';
      document.getElementById('toggle-link').style.display    = 'none';
      document.getElementById('message-box').style.display    = 'none';
      document.getElementById('verify-screen').style.display  = 'flex';
    }

    function backToLogin() {
      document.getElementById('email-field').style.display    = 'flex';
      document.getElementById('password-field').style.display = 'flex';
      document.getElementById('forgot-row').style.display     = 'block';
      document.getElementById('submit-btn').style.display     = 'block';
      document.getElementById('toggle-link').style.display    = 'block';
      document.getElementById('verify-screen').style.display  = 'none';
      mode = 'login';
      document.getElementById('submit-btn').textContent = 'כניסה';
      document.getElementById('toggle-link').innerHTML = 'אין לך חשבון? <a onclick="switchMode()">הרשמה</a>';
    }

    async function resendVerification() {
      const btn = document.getElementById('resend-btn');
      btn.disabled = true; btn.textContent = 'שולח...';
      const { error } = await sb.auth.resend({ type: 'signup', email: pendingEmail });
      btn.textContent = error ? 'שגיאה — נסה שוב' : '✓ נשלח!';
      setTimeout(() => { btn.disabled = false; btn.textContent = 'שלח שוב'; }, 3000);
    }

    async function handleSubmit() {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('submit-btn');
      hideMessage();
      btn.disabled = true;
      btn.textContent = mode === 'login' ? 'מתחבר...' : 'יוצר חשבון...';

      if (mode === 'login') {
        const { error } = await sb.auth.signInWithPassword({ email, password });
        if (error) {
          showMessage(error.message.includes('Email not confirmed')
            ? 'האימייל שלך לא אומת. בדוק את תיבת הדואר.'
            : error.message, 'error');
          btn.disabled = false; btn.textContent = 'כניסה';
        } else {
          window.location.href = 'dashboard.html';
        }
      } else {
        const { data, error } = await sb.auth.signUp({
          email, password,
          options: { emailRedirectTo: window.location.origin }
        });
        if (error) {
          showMessage(error.message, 'error');
          btn.disabled = false; btn.textContent = 'צור חשבון';
        } else if (data.session) {
          window.location.href = 'onboarding.html';
        } else {
          showVerifyScreen(email);
        }
      }
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') handleSubmit(); });
  </script>
  <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
</body>
