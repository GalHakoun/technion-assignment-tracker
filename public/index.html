<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checker</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a6ab5">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Checker">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="auth-container">
    <div class="auth-logo">
      <svg width="44" height="44" viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg" class="auth-logo-img">
        <circle cx="22" cy="22" r="20.5" fill="none" stroke="#7c6ff7" stroke-width="3"/>
        <circle cx="22" cy="22" r="16.5" fill="#111111"/>
        <polyline points="14,22 19.5,28 30,15" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Checker
    </div>
    <p class="auth-tagline">עקוב אחרי כל המטלות שלך ממקום אחד</p>

    <div class="auth-card">
      <div class="tabs">
        <div class="tab active" id="tab-login" onclick="switchTab('login')">התחברות</div>
        <div class="tab" id="tab-signup" onclick="switchTab('signup')">הרשמה</div>
      </div>

      <div id="message" style="display:none" class="message"></div>

      <form id="auth-form" onsubmit="handleSubmit(event)">
        <div class="form-group">
          <label for="email">אימייל</label>
          <input type="email" id="email" placeholder="your@email.com" required autocomplete="email" dir="ltr">
        </div>
        <div class="form-group">
          <label for="password">סיסמה</label>
          <input type="password" id="password" placeholder="סיסמה" required minlength="6" autocomplete="current-password">
        </div>
        <div class="form-group remember-row" id="remember-row">
          <label class="remember-label">
            <input type="checkbox" id="remember-me" checked>
            זכור אותי
          </label>
        </div>
        <button type="submit" class="btn btn-primary" id="submit-btn">התחבר</button>
      </form>

      <!-- Email verification pending screen -->
      <div id="verify-pending" style="display:none;text-align:center;padding:0.5rem 0">
        <div style="font-size:2.5rem;margin-bottom:0.75rem">📧</div>
        <div style="font-size:1rem;font-weight:700;color:var(--text);margin-bottom:0.5rem">בדוק את האימייל שלך</div>
        <div style="font-size:0.875rem;color:var(--text-muted);line-height:1.65;margin-bottom:1.25rem">
          שלחנו קישור אימות אל<br>
          <strong id="verify-email-addr" style="color:var(--text);direction:ltr;display:inline-block"></strong><br>
          לחץ על הקישור להפעלת החשבון.
        </div>
        <button onclick="resendVerification()" class="btn btn-primary" id="resend-btn">שלח שוב</button>
        <div style="margin-top:0.875rem">
          <button onclick="backToLogin()" style="background:none;border:none;color:var(--accent);font-size:0.875rem;cursor:pointer;text-decoration:underline;font-family:inherit">חזור להתחברות</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const { createClient } = supabase;
    const sb = createClient(
      'https://rcngaonfuljhtthsvpap.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJjbmdhb25mdWxqaHR0aHN2cGFwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MjUyMjMsImV4cCI6MjA5MjUwMTIyM30.5Ig-xpFdKGcK7U_l1jauGb8dSci6atmJoDng2p1A9N0'
    );

    let currentTab = 'login';
    let pendingEmail = '';

    async function init() {
      // Handle email verification redirect (PKCE code exchange)
      const params = new URLSearchParams(window.location.search);
      if (params.get('code')) {
        const { error } = await sb.auth.exchangeCodeForSession(window.location.href);
        if (!error) { window.location.href = 'dashboard.html'; return; }
      }
      // Check for existing valid session (also handles implicit-flow hash tokens)
      const { data: { session } } = await sb.auth.getSession();
      if (session) window.location.href = 'dashboard.html';
    }

    init();

    function switchTab(tab) {
      currentTab = tab;
      document.getElementById('tab-login').classList.toggle('active', tab === 'login');
      document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
      document.getElementById('submit-btn').textContent = tab === 'login' ? 'התחבר' : 'צור חשבון';
      document.getElementById('password').autocomplete = tab === 'login' ? 'current-password' : 'new-password';
      document.getElementById('remember-row').style.display = tab === 'login' ? 'block' : 'none';
      hideMessage();
    }

    function showMessage(text, type) {
      const el = document.getElementById('message');
      el.textContent = text;
      el.className = 'message ' + type;
      el.style.display = 'block';
    }

    function hideMessage() {
      document.getElementById('message').style.display = 'none';
    }

    function showVerificationPending(email) {
      pendingEmail = email;
      document.getElementById('auth-form').style.display = 'none';
      document.getElementById('message').style.display = 'none';
      document.getElementById('verify-email-addr').textContent = email;
      document.getElementById('verify-pending').style.display = 'block';
    }

    function backToLogin() {
      document.getElementById('verify-pending').style.display = 'none';
      document.getElementById('auth-form').style.display = 'block';
      switchTab('login');
    }

    async function resendVerification() {
      const btn = document.getElementById('resend-btn');
      btn.disabled = true;
      btn.textContent = 'שולח...';
      const { error } = await sb.auth.resend({ type: 'signup', email: pendingEmail });
      if (error) {
        btn.textContent = 'שגיאה — נסה שוב';
      } else {
        btn.textContent = '✓ נשלח!';
      }
      setTimeout(() => { btn.disabled = false; btn.textContent = 'שלח שוב'; }, 3000);
    }

    async function handleSubmit(e) {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('submit-btn');

      btn.disabled = true;
      btn.textContent = currentTab === 'login' ? 'מתחבר...' : 'יוצר חשבון...';
      hideMessage();

      if (currentTab === 'login') {
        const remember = document.getElementById('remember-me').checked;
        const { error } = await sb.auth.signInWithPassword({ email, password });
        if (error) {
          if (error.message.toLowerCase().includes('email not confirmed')) {
            showMessage('האימייל שלך לא אומת עדיין. בדוק את תיבת הדואר ולחץ על קישור האימות.', 'error');
          } else {
            showMessage(error.message, 'error');
          }
          btn.disabled = false;
          btn.textContent = 'התחבר';
        } else {
          localStorage.setItem('remember_me', remember ? 'true' : 'false');
          if (!remember) {
            // Move session from localStorage → sessionStorage so it clears on browser close
            const key = 'sb-rcngaonfuljhtthsvpap-auth-token';
            const data = localStorage.getItem(key);
            if (data) { sessionStorage.setItem(key, data); localStorage.removeItem(key); }
          }
          window.location.href = 'dashboard.html';
        }
      } else {
        const { data, error } = await sb.auth.signUp({
          email,
          password,
          options: { emailRedirectTo: window.location.origin }
        });
        if (error) {
          showMessage(error.message, 'error');
          btn.disabled = false;
          btn.textContent = 'צור חשבון';
        } else if (data.session) {
          localStorage.setItem('remember_me', 'true');
          window.location.href = 'onboarding.html';
        } else {
          showVerificationPending(email);
        }
      }
    }
  </script>
  <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
</body>
</html>
