<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checker</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#7c6ff7">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Checker">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #eeeef8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: absolute;
      top: -80px; left: -80px;
      width: 320px; height: 320px;
      border-radius: 50%;
      background: radial-gradient(circle, #AFA9EC 0%, transparent 70%);
      opacity: 0.5;
      pointer-events: none;
    }
    body::after {
      content: '';
      position: absolute;
      bottom: -60px; right: -60px;
      width: 260px; height: 260px;
      border-radius: 50%;
      background: radial-gradient(circle, #CECBF6 0%, transparent 70%);
      opacity: 0.5;
      pointer-events: none;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse-ring {
      0%   { transform: scale(1);    opacity: 0.6; }
      70%  { transform: scale(1.55); opacity: 0; }
      100% { transform: scale(1.55); opacity: 0; }
    }
    @keyframes checkDraw {
      from { stroke-dashoffset: 40; }
      to   { stroke-dashoffset: 0; }
    }

    .fade1 { animation: fadeUp 0.6s ease both 0.1s; }
    .fade2 { animation: fadeUp 0.6s ease both 0.35s; }
    .fade3 { animation: fadeUp 0.6s ease both 0.55s; }
    .fade4 { animation: fadeUp 0.6s ease both 0.75s; }

    .container {
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      z-index: 1;
    }

    .logo-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      margin-bottom: 36px;
    }

    .icon-ring-container {
      position: relative;
      width: 72px;
      height: 72px;
    }

    .pulse-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid #7F77DD;
      animation: pulse-ring 2s ease-out infinite;
    }
    .pulse-ring-2 {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid #AFA9EC;
      animation: pulse-ring 2s ease-out infinite 0.6s;
    }

    .icon-circle {
      position: absolute;
      inset: 0;
      background: #111;
      border-radius: 50%;
      border: 2px solid #7F77DD;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon-circle svg polyline {
      stroke-dasharray: 40;
      stroke-dashoffset: 0;
      animation: checkDraw 0.8s ease both 0.3s;
    }

    .logo-title { text-align: center; }
    .logo-title h1 {
      font-size: 26px;
      font-weight: 500;
      color: #26215C;
      letter-spacing: -0.5px;
    }
    .logo-title p {
      margin-top: 6px;
      font-size: 13px;
      color: #7F77DD;
    }

    .card {
      width: 100%;
      background: white;
      border: 1px solid #d8d8ee;
      border-radius: 16px;
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .field label { font-size: 12px; color: #6060a0; }
    .field input {
      background: #f0f0f8;
      border: 1px solid #d0d0e8;
      border-radius: 10px;
      padding: 12px 14px;
      color: #2a2a4a;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
      width: 100%;
      direction: ltr;
    }
    .field input:focus { border-color: #7F77DD; }
    .field input::placeholder { color: #9090b8; }

    .forgot { text-align: left; }
    .forgot a { font-size: 12px; color: #7F77DD; text-decoration: none; }

    .message-box {
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      display: none;
    }
    .message-box.error   { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
    .message-box.success { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }

    .btn-login {
      width: 100%;
      padding: 13px;
      background: #534AB7;
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      font-family: inherit;
    }
    .btn-login:hover    { background: #7F77DD; }
    .btn-login:active   { transform: scale(0.97); }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }

    /* Google button + divider */
    .auth-divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      color: #9090b8;
      font-size: 12px;
      margin: 0;
    }
    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #d8d8ee;
    }
    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      width: 100%;
      padding: 12px;
      background: #fff;
      border: 1px solid #d0d0e8;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      color: #2a2a4a;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s, border-color 0.2s;
    }
    .btn-google:hover { background: #f0f0f8; border-color: #b0b0d8; }

    .signup-link {
      margin-top: 16px;
      font-size: 12px;
      color: #9090b8;
      text-align: center;
    }
    .signup-link a { color: #7F77DD; text-decoration: none; cursor: pointer; }

    /* מסך אימות אימייל */
    .verify-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 12px;
      padding: 8px 0;
    }
    .verify-icon { font-size: 2.5rem; }
    .verify-title { font-size: 1rem; font-weight: 700; color: #26215C; }
    .verify-desc  { font-size: 0.85rem; color: #6b7280; line-height: 1.65; }
    .verify-email { color: #26215C; font-weight: 600; direction: ltr; display: inline-block; }
    .btn-resend {
      width: 100%;
      padding: 13px;
      background: #534AB7;
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
    }
    .btn-resend:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-back-login {
      background: none; border: none; color: #7F77DD;
      font-size: 13px; cursor: pointer; text-decoration: underline;
      font-family: inherit;
    }
  </style>
</head>
<body>

  <div class="container">

    <div class="logo-wrapper fade1">
      <div class="icon-ring-container">
        <div class="pulse-ring"></div>
        <div class="pulse-ring-2"></div>
        <div class="icon-circle">
          <svg width="32" height="32" viewBox="0 0 14 14" fill="none">
            <polyline points="2,7 6,11 12,3" stroke="white" stroke-width="2.2"
              stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>
      <div class="logo-title">
        <h1>Checker</h1>
        <p>המטלות שלך, מסודרות</p>
      </div>
    </div>

    <!-- טופס כניסה / הרשמה -->
    <div class="card fade2" id="auth-card">
      <div class="field">
        <label for="email">אימייל</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="field">
        <label for="password">סיסמה</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" minlength="6">
      </div>
      <div class="forgot" id="forgot-row">
        <a href="#">שכחתי סיסמה</a>
      </div>
      <div class="message-box" id="message-box"></div>
      <button class="btn-login" id="submit-btn" onclick="handleSubmit()">כניסה</button>

      <div id="google-section">
        <div class="auth-divider"><span>או</span></div>
        <button class="btn-google" onclick="signInWithGoogle()">
          <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
            <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/>
            <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
            <path d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z" fill="#FBBC05"/>
            <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 6.293C4.672 4.166 6.656 3.58 9 3.58z" fill="#EA4335"/>
          </svg>
          המשך עם Google
        </button>
      </div>

      <!-- מסך אימות -->
      <div class="verify-screen" id="verify-screen">
        <div class="verify-icon">📧</div>
        <div class="verify-title">בדוק את האימייל שלך</div>
        <div class="verify-desc">
          שלחנו קישור אימות אל<br>
          <span class="verify-email" id="verify-email"></span><br>
          לחץ על הקישור להפעלת החשבון.
        </div>
        <button class="btn-resend" id="resend-btn" onclick="resendVerification()">שלח שוב</button>
        <button class="btn-back-login" onclick="backToLogin()">חזור להתחברות</button>
      </div>
    </div>

    <p class="signup-link fade3" id="toggle-link">
      אין לך חשבון? <a onclick="switchMode()">הרשמה</a>
    </p>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const { createClient } = supabase;
    const sb = createClient(
      'https://rcngaonfuljhtthsvpap.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJjbmdhb25mdWxqaHR0aHN2cGFwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MjUyMjMsImV4cCI6MjA5MjUwMTIyM30.5Ig-xpFdKGcK7U_l1jauGb8dSci6atmJoDng2p1A9N0'
    );

    let mode = 'login';
    let pendingEmail = '';

    async function init() {
      // Catches OAuth session the moment it's established (covers PKCE redirect)
      sb.auth.onAuthStateChange((event, session) => {
        if (session) window.location.href = 'dashboard.html';
      });
      const params = new URLSearchParams(window.location.search);
      if (params.get('code')) {
        await sb.auth.exchangeCodeForSession(window.location.href);
        return; // onAuthStateChange will redirect if successful
      }
      const { data: { session } } = await sb.auth.getSession();
      if (session) window.location.href = 'dashboard.html';
    }
    init();

    function switchMode() {
      mode = mode === 'login' ? 'signup' : 'login';
      const isLogin = mode === 'login';
      document.getElementById('submit-btn').textContent = isLogin ? 'כניסה' : 'צור חשבון';
      document.getElementById('forgot-row').style.display = isLogin ? 'block' : 'none';
      document.getElementById('toggle-link').innerHTML = isLogin
        ? 'אין לך חשבון? <a onclick="switchMode()">הרשמה</a>'
        : 'כבר יש לך חשבון? <a onclick="switchMode()">התחברות</a>';
      document.getElementById('password').autocomplete = isLogin ? 'current-password' : 'new-password';
      hideMessage();
    }

    function showMessage(text, type) {
      const el = document.getElementById('message-box');
      el.textContent = text;
      el.className = 'message-box ' + type;
      el.style.display = 'block';
    }
    function hideMessage() {
      document.getElementById('message-box').style.display = 'none';
    }

    function showVerifyScreen(email) {
      pendingEmail = email;
      document.getElementById('verify-email').textContent = email;
      document.getElementById('email').closest('.field').style.display = 'none';
      document.getElementById('password').closest('.field').style.display = 'none';
      document.getElementById('forgot-row').style.display = 'none';
      document.getElementById('message-box').style.display = 'none';
      document.getElementById('submit-btn').style.display = 'none';
      document.getElementById('google-section').style.display = 'none';
      document.getElementById('toggle-link').style.display = 'none';
      document.getElementById('verify-screen').style.display = 'flex';
    }

    function backToLogin() {
      document.getElementById('email').closest('.field').style.display = 'flex';
      document.getElementById('password').closest('.field').style.display = 'flex';
      document.getElementById('forgot-row').style.display = 'block';
      document.getElementById('submit-btn').style.display = 'block';
      document.getElementById('google-section').style.display = 'block';
      document.getElementById('toggle-link').style.display = 'block';
      document.getElementById('verify-screen').style.display = 'none';
      mode = 'login';
      document.getElementById('submit-btn').textContent = 'כניסה';
      document.getElementById('toggle-link').innerHTML = 'אין לך חשבון? <a onclick="switchMode()">הרשמה</a>';
    }

    async function signInWithGoogle() {
      await sb.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: window.location.origin }
      });
    }

    async function resendVerification() {
      const btn = document.getElementById('resend-btn');
      btn.disabled = true;
      btn.textContent = 'שולח...';
      const { error } = await sb.auth.resend({ type: 'signup', email: pendingEmail });
      btn.textContent = error ? 'שגיאה — נסה שוב' : '✓ נשלח!';
      setTimeout(() => { btn.disabled = false; btn.textContent = 'שלח שוב'; }, 3000);
    }

    async function handleSubmit() {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('submit-btn');
      hideMessage();
      btn.disabled = true;
      btn.textContent = mode === 'login' ? 'מתחבר...' : 'יוצר חשבון...';

      if (mode === 'login') {
        const { error } = await sb.auth.signInWithPassword({ email, password });
        if (error) {
          showMessage(error.message.includes('Email not confirmed')
            ? 'האימייל שלך לא אומת עדיין. בדוק את תיבת הדואר.'
            : error.message, 'error');
          btn.disabled = false;
          btn.textContent = 'כניסה';
        } else {
          window.location.href = 'dashboard.html';
        }
      } else {
        const { data, error } = await sb.auth.signUp({
          email, password,
          options: { emailRedirectTo: window.location.origin }
        });
        if (error) {
          showMessage(error.message, 'error');
          btn.disabled = false;
          btn.textContent = 'צור חשבון';
        } else if (data.session) {
          window.location.href = 'onboarding.html';
        } else {
          showVerifyScreen(email);
        }
      }
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') handleSubmit();
    });
  </script>
  <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
</body>
</html>
